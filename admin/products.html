<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товары | Айдана Sweets Админ</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-body">

    <!-- Боковое меню -->
    <div class="admin-sidebar">
        <div class="admin-sidebar-header">
            <h2><i class="fas fa-candy-cane"></i> Айдана Sweets</h2>
            <p style="font-size:.7rem;opacity:.7;margin-top:5px;">Админ-панель</p>
        </div>
        <div class="admin-sidebar-menu">
            <a href="dashboard.html" class="admin-menu-item"><i class="fas fa-tachometer-alt"></i> Дашборд</a>
            <a href="products.html"  class="admin-menu-item active"><i class="fas fa-box"></i> Товары</a>
            <a href="orders.html"    class="admin-menu-item"><i class="fas fa-shopping-cart"></i> Заказы</a>
            <a href="#" class="admin-menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выход</a>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="admin-main">
        <div class="admin-header">
            <h1><i class="fas fa-box"></i> Управление товарами</h1>
            <button class="btn btn-primary" onclick="showAddModal()">
                <i class="fas fa-plus"></i> Добавить товар
            </button>
        </div>

        <div id="alertBox" style="display:none;padding:12px 16px;border-radius:10px;margin-bottom:16px;font-weight:600;"></div>

        <div class="admin-table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Фото</th><th>Название</th><th>Бренд</th>
                        <th>Тип</th><th>Какао</th><th>Цена</th>
                        <th>Наличие</th><th>Действия</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="8" style="text-align:center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Модальное окно товара -->
<div class="admin-modal" id="productModal">
    <div class="admin-modal-content">
        <div class="admin-modal-header">
            <h3 id="modalTitle">Добавить товар</h3>
            <button class="admin-modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="admin-modal-body">
            <div class="admin-form-group">
                <label>Название товара *</label>
                <input type="text" id="productName" class="admin-form-control" placeholder="Молочный шоколад с орехами">
            </div>
            <div class="admin-form-row">
                <div class="admin-form-group">
                    <label>Бренд *</label>
                    <select id="productBrand" class="admin-form-control">
                        <option value="milka">Milka</option>
                        <option value="lindt">Lindt</option>
                        <option value="kitkat">KitKat</option>
                        <option value="nutella">Nutella</option>
                        <option value="yahya">Yahya</option>
                    </select>
                </div>
                <div class="admin-form-group">
                    <label>Тип шоколада</label>
                    <select id="productType" class="admin-form-control">
                        <option value="dark">🍫 Тёмный</option>
                        <option value="milk">🥛 Молочный</option>
                        <option value="white">🤍 Белый</option>
                    </select>
                </div>
            </div>
            <div class="admin-form-row">
                <div class="admin-form-group">
                    <label>% Какао</label>
                    <input type="number" id="productCacao" class="admin-form-control" placeholder="30–99">
                </div>
                <div class="admin-form-group">
                    <label>Цена (сом)</label>
                    <input type="number" id="productPrice" class="admin-form-control" placeholder="350">
                </div>
            </div>
            <div class="admin-form-group">
                <label>Наличие на складе</label>
                <select id="productInStock" class="admin-form-control">
                    <option value="true">✅ В наличии</option>
                    <option value="false">❌ Нет в наличии</option>
                </select>
            </div>
            <div class="admin-form-group">
                <label>Вкус / Добавки</label>
                <input type="text" id="productFlavor" class="admin-form-control" placeholder="фундук, карамель...">
            </div>
            <div class="admin-form-group">
                <label>Описание</label>
                <textarea id="productDesc" class="admin-form-control" rows="3" placeholder="Краткое описание..."></textarea>
            </div>
            <div class="admin-form-group">
                <label>URL изображения</label>
                <input type="url" id="productImage" class="admin-form-control" placeholder="https://...">
            </div>
            <input type="hidden" id="editId" value="">
        </div>
        <div class="admin-modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">Сохранить</button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script>
const typeLabel = { dark:'🍫 Тёмный', milk:'🥛 Молочный', white:'🤍 Белый' };

function showAlert(msg, success = true) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.style.display = 'block';
    box.style.background = success ? '#E8F5E9' : '#FFEBEE';
    box.style.color      = success ? '#2E7D5B' : '#C62828';
    setTimeout(() => box.style.display = 'none', 3000);
}

async function loadProducts() {
    try {
        const products = await api.getProducts();
        const tbody    = document.getElementById('productsTableBody');

        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">🍫 Нет товаров</td></tr>';
            return;
        }

        tbody.innerHTML = products.map(p => `
            <tr>
                <td><img src="${p.image || 'https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=200'}" width="45" height="45" style="border-radius:8px;object-fit:cover"></td>
                <td><strong>${p.name}</strong></td>
                <td>${p.brandName}</td>
                <td>${typeLabel[p.type] || p.type}</td>
                <td>${p.cacao}%</td>
                <td>${p.price} сом</td>
                <td>${p.inStock
                    ? '<span class="status-badge status-active">✅ В наличии</span>'
                    : '<span class="status-badge status-inactive">❌ Нет в наличии</span>'}</td>
                <td class="admin-actions">
                    <button class="admin-btn admin-btn-edit"   onclick="editProduct(${p.id})">✏️</button>
                    <button class="admin-btn admin-btn-delete" onclick="deleteProduct(${p.id})">🗑️</button>
                </td>
            </tr>
        `).join('');
    } catch(e) {
        showAlert('Ошибка загрузки: ' + e.message, false);
    }
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = 'Добавить товар';
    document.getElementById('editId').value = '';
    document.getElementById('productName').value   = '';
    document.getElementById('productBrand').value  = 'milka';
    document.getElementById('productType').value   = 'dark';
    document.getElementById('productCacao').value  = '';
    document.getElementById('productPrice').value  = '';
    document.getElementById('productInStock').value = 'true';
    document.getElementById('productFlavor').value = '';
    document.getElementById('productDesc').value   = '';
    document.getElementById('productImage').value  = '';
    document.getElementById('productModal').classList.add('active');
}

async function editProduct(id) {
    try {
        const p = await api.getProduct(id);
        document.getElementById('modalTitle').textContent    = 'Редактировать товар';
        document.getElementById('editId').value              = p.id;
        document.getElementById('productName').value         = p.name;
        document.getElementById('productBrand').value        = p.brand;
        document.getElementById('productType').value         = p.type;
        document.getElementById('productCacao').value        = p.cacao;
        document.getElementById('productPrice').value        = p.price;
        document.getElementById('productInStock').value      = p.inStock ? 'true' : 'false';
        document.getElementById('productFlavor').value       = p.flavor;
        document.getElementById('productDesc').value         = p.description;
        document.getElementById('productImage').value        = p.image;
        document.getElementById('productModal').classList.add('active');
    } catch(e) {
        showAlert('Ошибка: ' + e.message, false);
    }
}

function closeModal() {
    document.getElementById('productModal').classList.remove('active');
}

async function saveProduct() {
    const name    = document.getElementById('productName').value.trim();
    const brand   = document.getElementById('productBrand').value;
    const brandNames = { milka:'Milka', lindt:'Lindt', kitkat:'KitKat', nutella:'Nutella', yahya:'Yahya' };

    if (!name) { showAlert('Введите название товара', false); return; }

    const data = {
        name,
        brand,
        brandName:   brandNames[brand] || brand,
        type:        document.getElementById('productType').value,
        cacao:       parseInt(document.getElementById('productCacao').value) || 0,
        price:       parseInt(document.getElementById('productPrice').value) || 0,
        inStock:     document.getElementById('productInStock').value !== 'false',
        flavor:      document.getElementById('productFlavor').value,
        description: document.getElementById('productDesc').value,
        image:       document.getElementById('productImage').value,
    };

    const editId = document.getElementById('editId').value;
    const btn    = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Сохранение...';

    try {
        if (editId) {
            await api.updateProduct(editId, data);
            showAlert('✅ Товар обновлён!');
        } else {
            await api.createProduct(data);
            showAlert('✅ Товар добавлен!');
        }
        closeModal();
        loadProducts();
    } catch(e) {
        showAlert('Ошибка: ' + e.message, false);
    } finally {
        btn.disabled    = false;
        btn.textContent = 'Сохранить';
    }
}

async function deleteProduct(id) {
    if (!confirm('Удалить этот товар?')) return;
    try {
        await api.deleteProduct(id);
        showAlert('🗑️ Товар удалён');
        loadProducts();
    } catch(e) {
        showAlert('Ошибка: ' + e.message, false);
    }
}

// Закрытие модалки по клику вне
window.onclick = e => {
    const modal = document.getElementById('productModal');
    if (e.target === modal) closeModal();
};

(async () => {
    await requireAuth();
    loadProducts();
    document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); logout(); });
})();
</script>
</body>
</html>
